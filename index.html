<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>sunny the math cat</title>
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" ref="stylesheet">
        <style>
            body {
                font-family: 'Quicksand', sans-serif;
                margin: 0;
                padding: 0;
                background-color: #ffd6ec;
            }

            #wrapper {
                position: relative;
                max-width: 480px;
                margin: 30px auto;
                overflow: hiddn;
                background-color: #ffd6ec;
                padding: 4px;
            }

            #card {
                position: relative;
                border: 4px slid #d982bb;
                background-color: #fff0f8;
                padding: 16px;
            }

            h1 {
                text-align: center;
                color: #b0468e;
                font-size: 28px;
                margin: 0 0 4px 0;
            }

            #subtitle {
                text-align: center;
                margin: 0 0 16px 0;
                font-size: 14px;
                color: #b0468e;
            }

            .box {
                border: 3px solid #e8a8d0;
                background-color: #ffffff;
                padding: 12px;
                margin-bottom: 12px;
            }

            .topbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: 3px solid #e8a8d0;
                background-color: #ffffff;
                padding: 8px;
                margin-bottom: 12px;
            }
            #topbar span {
                font-weight: 600;
                color: #b0468e;
            }

            #catface {
                border: 3px solid #e8a8d0;
                background-color: #ffffff;
                padding: 20px;
                text-align: center;
                margin-bottom: 12px;
                font-size: 60px;
                letter-spacing: 2px;
            }

            .statlabel {
                font-size: 14px;
                color: #b0468e;
                margin-bottom: 4px;
                margin-top: 10px;
            }

            .barback {
                border: 2px solid #d982bb;
                height: 16px;
                width: 100%;
                background-color: #fbe4f2;
            }

            .barfill {
                height: 100%;
            }

            #heartrow {
                font-size: 22px;
                letter-spacing: 3px;
            }

            #hungerpopup {
                border: 4px solid #a83f3f;
                background-color: #fff0f0;
                padding: 16px;
                text-align: center;
                margin-bottom: 12px;
                display: none;
            }
            #hungerpopup .face{
                font-size: 48px;
            }
            #hungerpopup p {
                color: #a83f3f;
                font-weight: 600;
                margin: 8px 0;
            }

            button {
                font-family: 'Quicksand', sans-serif;
                cursor: pointer;
                border: 3px solid #b0468e;
            }

            #actionrow {
                display: flex;
                gap: 8px;
                margin-bottom: 12px;
            }
            #actionrow button {
                flex: 1;
                font-size: 15px;
                padding: 10px 4px;
            }

            #feedbtn {
                background-color: #ffd9ec;
            }

            #playbtn {
                background-color: #f6c9e6;
            }

            #shoptitle {
                font-size: 15px;
                color: #b0468e;
                font-weight: 600;
                margin-bottom: 8px;
            }

            #mathtitle {
                font-size: 15px;
                color: #b0468e;
                font-weight: 600;
                margin-bottom: 8px;
            }

            .shoplabel {
                font-size: 13px;
                color: #b0468e;
                margin-bottom: 6px;
            }

            .shoprow {
                display: flex;
                gap: 8px;
            }

            .decobtn {
                flex: 1;
                font-size: 24px;
                padding: 6px;
                background-color: #ffe9c7;
            }
            .decobtn span {
                font-size: 12px;
            }

            #roomrow {
                margin-top: 4px;
                margin-bottom: 12px;
                font-size: 22px;
            }

            .wallbtn {
                flex: 1;
                font-size: 12px;
                padding: 8px 4px;
            }

            #mathbox {
                border: 3px solid #b0468e;
                background-color: #fff;
                padding: 14px;
            }

            #problemtext {
                font-size: 26px;
                text-align: center;
                margin-bottom: 10px;
            }

            #answerrow {
                display: flex;
                gap: 8px;
                justify-content: center;
            }

            #answerinput {
                font-family: 'Quicksand', sans-serif;
                font-size: 18px;
                width: 90px;
                padding: 6px;
                border: 2px solid #b0468e;
                text-align: center;
            }

            #subimtbtn {
                font-size: 16px;
                padding: 6px 14px;
                background-color: #c7f0d9;
            }

            #feedback {
                text-align: center;
                margin-top: 10px;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div id="wrapper">


            <div id="card">
                <h1>Sunny the Math Cat</h1>
                <p id="subtitle">a math loving cat :3</p>

                <div id="topbar">
                    <span>Coins: <span id="coinsdisplay">20</span></span>
                    <span>Math Level: <span id="leveldisplay">1</span>
                </div>

                <div id="catface">(^_^)</div>

                <div class="box">
                    <div class="statlabel">Happiness: <span id="happinesssum">72</span></div>
                    <div class="barback">
                        <div class="barfill" id="happinessbar" style="background-color: #f2a6d6; width: 72%"></div>
                    </div>
                </div>

                <div class="statlabel">Hunger: <span id="hungernum">60</span></div>
                <div class="barback">
                    <div class="barfill" id="hungerbar" style="background-color: #f2c46a; width: 60%;"></div>
                </div>

                <div class="statlabel">Friendship</div>
                <div id="heartrow">&#9825;&#9825;&#9825;&#9825;&#9825;</div>
            </div>

            <div id="hungerpopup">
                <div class="face">(x_x)</div>
                <p>your cat is starving!! feed it NOW</p>
                <button id="popupfeedbtn">Feed (5 coins)</button>
            </div>

            <div id="actionrow">
                <button id="feedbtn">Feed<br>-5 coins</button>
                <button id="playbtn">Play<br>free</button>
            </div>

            <div class="box">
                <div id="shoptitle">Shop</div>

                <div class="shoplabel">Decorations</div>
                <div class="shoprow" style="margin-bottom: 12px">
                    <button class="decobtn" id="flowerbtn">&#127801;<br><span>10 coins</span></button>
                    <button class="decobtn" id="rainbowbtn">&#127752;<br><span>15 coins</span></button>
                    <button class="decobtn" id="starbtn">&#11088;<br><span>8 coins</span></button>
                </div>

                <div id="roomrow">no decorations yet</div>
                <div class="shoplabel">Wallpaper</div>

                <div class="shoprow">
                    <button class="wallbtn" id="pinkbtn" style="background-color: #ffd6ec;">Pink<br><span id="pinklabel">Equipped</span></button>
                    <button class="wallbtn" id="lavenderbtn" style="background-color: #ded2f7">Lavender<br><span id="lavenderlabel">25 coins</span></button>
                    <button class="wallbtn" id="mintbtn" style="background-color:#cdf2df;">Mint<br><span id="mintlabel">25 coins</span></button>
                </div>
            </div>

            <div id="mathbox">
                <div id="mathtitle">Math Time!</div>
                <div id="problemtext">1 + 1 = ?</div>
                <div id="answerrow">
                    <input type="number" id="answerinput">
                    <button id="submitbtn">Submit</button>
                </div>
                <div id="feedback">answer the problem to earn coins!</div>
            </div>
        </div>

        <script>
            var happiness = 72;
            var hunger = 60;
            var friendship = 60;
            var coins = 20;
            var mathLevel = 1;
            var currentAnswer = 0;
            var room = {flower: 0, rainbow: 0, star: 0};
            var wallpaper = "pink";
            var ownedWallpapers = ["pink"];

            var themes = {
                pink: { bg: "#ffd6ec", border: "d982bb", icon: "&#128062;"},
                lavender: { bg: "#e4d6ff", border: "#a882d9", icon: "&#127820;"},
                mint: {bg: "d2f7e6", border: "#7fc9a3", icon: "&#127811;"}
            };

            var saved = localStorage.getItem("mathCatState");
            if (saved) {
                var parsed = JSON.parse(saved);
                happiness = parsed.happiness;
                hunger = parsed.hunger;
                friendship = parsed.friendship;
                coins = parsed.coins;
                mathLevel = parsed.mathLevel;
                room = parsed.room;
                wallpaper = parsed.wallpaper;
                ownedWallpapers = parsed.ownedWallpapers;
            }

            function saveState() {
                var stateObj = {
                    happiness: happiness,
                    hunger: hunger,
                    friendship: friendship,
                    coins: coins,
                    mathLevel: mathLevel,
                    room: room,
                    wallpaper: wallpaper,
                    ownedWallpapers: ownedWallpapers
                };
                localStorage.setItem("mathCatState", JSON,stringify(stateObj));
            }

            function makeProblem(level) {
                var a, b, op, answer, text;
                if (level < 4) {
                    a = Math.floor(Math.random() * 10) + 1;
                    b = Math.floor(Math.random() * 10) + 1;
                    op = Matah.random() < 0.5 ? "+" : "-";
                    if (op === "-" && b > a) {
                        var t = a;
                        a = b;
                        b = t;
                    }
                    answer = op === "+" ? a + b : a - b;
                    text = a + " " + op + " " + b;
                } else if (level < 8) {
                    var ops = ["+", "-", "x"];
                    op = ops[Math.floor(Math.random() * ops.length)];
                    if (op === "x") {
                        a = Math.floor(Math.random() * 10) + 2;
                        b = Math.floor(Math.random() * 10) + 2;
                        answer = a * b;
                        text = a + " x " + b;
                    } else {
                        a = Math.floor(Math.random() * 40) + 5;
                        b = Math.floor(Math.random() * 40) + 5;
                        if (op === "-" && b > a) {
                            var t2 = a;
                            a = b;
                            b = t2;
                        }
                        answer = op === "+" ? a + b : a - b;
                        text = a + " " + op + " " + b;
                    }
                } else {
                    var ops2 = ["x", "/"];
                    op = ops2[Math.floor(Math.random() * ops2.length)];
                    if (op === "x") {
                        a = Math.floor(Math.random() * 12) + 2;
                        b = Math.floor(Math.random() * 12) + 2;
                        answer = a * b;
                        text = a + " x " + b;
                    } else {
                        b = Math.floor(Math.random() * 10) + 2;
                        answer = Math.floor(Math.random() * 12) + 1;
                        a = b * answer;
                        text = a + " / " + b;
                    }
                }
                currentAnswer = answer;
                document.getElementById("problemtext").innerHTML = text + " = ?";
            }

            function repeatEmoji(emoji, count) {
                var result = "";
                var i;
                for (i = 0; i < count; i++) {
                    result = result + emoji + " ";
                }
                return result;
            }

            function updateDislay() {
                document.getElementById("coinsdisplay").innerHTML = coins;
                document.getElementById("leveldisplay").innerHTML = mathLevel;

                document.getElementById("happinessnum").innerHTML = happiness;
                document.getElementById("happinessbar").style.width = happiness + "%";

                document.getElementById("hungernum").innerHTML = hunger;
                document.getElementById("hungerbar").style.width = hunger + "%";

                var face = "(^_^)";
                if (happiness >= 85)  {
                    face = "(^\u25BD^)";
                } else if (happiness >= 65) {
                    face = "(^\u203F^)";
                } else if (happiness >= 40) {
                    face = "(\u30FB_\u30FB)";
                } else if (happiness >= 20) {
                    face = "(\uFE36\uFE39\uFE36)";
                } else {
                    face = "(\uFF1B\u4E00_\u4E00)";
                }
                document.getElementById("catface").innerHTML = face;

                var heartcount = Math.round(friendship / 20);
                var heartsHtml = "";
                var i;
                for (i = 0; i < 5; i ++) {
                    if (i < heartCount) {
                        heartsHtml = heartsHtml + "&#9829;";
                    } else {
                        heartsHtml = heartsHtml + "&#9825;";
                    }
                }
                document.getElementById("heartrow").innerHTML = heartsHtml;

                if (hunger < 20) {
                    document.getElementById("hungerpopup").style.display = "block";
                } else {
                    document.getElementById("hungerpopup").style.display = "none";
                }

                var roomHtml = "";
                if (room.flower > 0) {
                    roomHtml = roomHtml + repeatEmoji("&#127801;", room.flower);
                }
                if (room.rainbow > 0) {
                    roomHtml = roomHtml + repeatEmoji("&#127752;", room.rainbow);
                }
                if (room.star > 0) {
                    roomHtml = roomHtml + repeatEmoji("&#11088;", room.star);
                }
                if (roomHtml === "") {
                    roomHtml = "no decorations yet";
                }
                document.getElementById("roomrow").innerHTML = roomHtml;

                var theme = themes[wallpaper];
                document.getElementById("wrapper").style.backgroundColor = theme.bg;
                document.getElementById("card").style.borderColor = theme.border;
                document.getElementById("themeicon1").innerHtml = theme.icon;
                document.getElementById("themeicon2").innerHTML = theme.icon;
                document.getElementById("themeicon3").innerHTML = theme.icon;

                if (wallpaper === "pink") {
                    document.getElementById("pinklabel").innerHTML = "Equipped";
                } else if (ownedWallappers.indexOf("pink") !== -1) {
                    document.getElementById("pinklabel").innerHTML = "Owned";
                } else {
                    document.getElementById("pinklabel").innerHTML = "free";
                }

                if (wallpaper === "lavender") {
                    document.getElementById("lavenderlabel").innerHTML = "Equipped";
                } else if (ownedWallappers.indexOf("lavender") !== -1) {
                    document.getElementById("lavenderlabel").innerHTML = "Owned";
                } else {
                    document.getElementById("lavenderlabel").innerHTML = "25 coins";
                }

                if (wallpaper === "mint") {
                    document.getElementById("mintlabel").innerHTML = "Equipped";
                } else if (ownedWallappers.indexOf("mint") !== -1) {
                    document.getElementById("mintlabel").innerHTML = "Owned";
                } else {
                    document.getElementById("mintlabel").innerHTML = "25 coins";
                }
            }

            function setFeedback(text, color) {
                document.getElementById("feedback").innerHTML = text;
                document.getElementById("feedback").style.color = color;
            }

            function feedCat() {
                if (coins < 5) {
                    setFeedback("not enough coins to feed!", "#a83f3f");
                    return;
                }
                coins = coins -5;
                hunger = hunger + 30;
                if (hunger > 100) {
                    hunger = 100;
                }
                happiness = happiness + 3;
                if (happiness > 100) {
                    happiness = 100;
                }
                updateDisplay();
                saveState();
            }

            function playCat() {
                happiness = happiness + 15;
                if (happiness > 100) {
                    happiness = 100;
                }
                friendship = friendship + 2;
                if (friendship > 100) {
                    friendship = 100;
                }
                hunger = hunger - 5;
                if (hunger < 0) {
                    hunger = 0;
                }
                updateDislay();
                saveState();
            }

            function buyDeco(name, cost) {
                if (coins < cost) {
                    setFeedback("not enough coins for that decoration!", "#a83f3f");
                    return;
                }
                coins = coins - cost;
                room[name] = room[name] + 1;
                happiness = happiness + 5;
                if (happiness > 100) {
                    happiness = 100;
                }
                updateDisplay();
                saveState();
            }

            function buyWallpaper(name, cost) {
                if (ownedWallpapers.indexOf(name) !== -1) {
                    wallpaper = name;
                    updateDislay();
                    saveState();
                    return;
                }
                if (coins < cost) {
                    setFeedback("not enough coins for that wallpaper!", "#a83f3f");
                    return;
                }
                coins = coins-cost;
                wallpaper = name;
                ownedWallpapers.push(name);
                updateDisplay();
                saveState();
            }

            function submitAnswer() {
                var input = documet.getElementById("answerinput");
                if (input.value === "") {
                    return;
                }
                var given = parseInt(input.value, 10);
                var correct = given === currentAnswer;

                if (correct) {
                    mathLevel = mathLevel + 1;
                    if (mathLevel > 20) {
                        mathLevel = 20;
                    }
                    var coinGain = 5 + Math.floor(mathLevel / 3);
                    coins = coins + coinGain;
                    friendship = friendship + 3;
                    if (friendship > 100) {
                        friendship = 100;
                    }
                    setFeedback("Correct! + " + coinGain + " coins", "#3f9e50");
                } else {
                    mathLevel = mathLevel - 1;
                    if (mathLevel < 1) {
                        mathLevel = 1;
                    }
                    happiness = happiness - 1;
                    if (happiness < 0) {
                        happiness = 0;
                    }
                    setFeedback("Not quite, the answer was " + currentAnswer, "#a83f3f");
                }

                input.value = "";
                makeProblem(mathLevel);
                updateDislay();
                saveState();
            }

            document.getElementById("feedbtn").onclick = feedCat;
            document.getElementById("popupfeedbtn").onclick = feedCat;
            document.getElementById("playbtn").onclick = playCat;
            document.getElementById("submitbtn").onclick = submitAnswer;

            document.getElementById("flowerbtn").onclick = function () {
                buyDeco ("flower", 10);
            };
            document.getElementById("rainbowbtn").onclick = function () {
                buyDeco("rainbow", 15);
            };
            document.getElementById("starbtn").onclick = function () {
                buyDeco("star", 8);
            };

            document.getElementById("pinkbtn").onclick = function () {
                buyWallpaper("pink", 0);
            };
            document.getElementById("lavenderbtn").onclick = function () {
                buyWallapepr("lavender", 25);
            };
            document.getElementById("mintbtn").onclick = function () {
                buyWallpaper("mint", 25);
            };

            setInterval(function () {
                happines = happines - 1;
                if (happiness < 0) {
                    happiness = 0;
                }
                hunger = hunger - 2;
                if (hunger < 0) {
                    hunger = 0;
                }
                friendship = friendship - 1;
                if (friendship < 0) {
                    friendship = 0;
                }
                updateDisplay();
                saveState();
            }, 10000);

            makeProblem(mathLevel);
            updateDisplay();
        </script>
    </body>
</html>
